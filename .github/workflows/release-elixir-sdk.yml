name: Release Elixir SDK

on:
  push:
    tags:
      - "elixir-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.0"
        required: true

jobs:
  release:
    name: Publish Elixir package
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v5

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#elixir-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Install Hex
        working-directory: elixir
        run: mix local.hex --force

      - name: Fetch dependencies
        working-directory: elixir
        run: mix deps.get

      - name: Verify version
        working-directory: elixir
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          MIX_VERSION="$(mix run -e 'IO.write(Mix.Project.config()[:version])')"
          test "$MIX_VERSION" = "$RELEASE_VERSION"

      - name: Check formatting
        working-directory: elixir
        run: mix format --check-formatted

      - name: Compile with warnings as errors
        working-directory: elixir
        run: mix compile --warnings-as-errors

      - name: Run tests
        working-directory: elixir
        run: mix test

      - name: Build docs
        working-directory: elixir
        run: mix docs

      - name: Dry-run Hex package
        working-directory: elixir
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --dry-run --yes

      - name: Publish to Hex.pm
        working-directory: elixir
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
