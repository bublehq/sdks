name: Release PHP SDK

on:
  push:
    tags:
      - "php-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.0"
        required: true

jobs:
  release:
    name: Validate, sync, and tag PHP SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#php-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, json
          coverage: none

      - name: Install dependencies
        working-directory: php
        run: composer install --no-interaction --prefer-dist

      - name: Validate composer.json
        working-directory: php
        run: composer validate --strict

      - name: Run tests
        working-directory: php
        run: composer test

      - name: Run static analysis
        working-directory: php
        run: composer analyse

      - name: Run coding standards
        working-directory: php
        run: composer cs

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PHP_SDK_DEPLOY_KEY }}" > ~/.ssh/php_sdk_deploy_key
          chmod 600 ~/.ssh/php_sdk_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/php_sdk_deploy_key
            IdentitiesOnly yes
          EOF

      - name: Split php/ subtree
        run: |
          git subtree split --prefix=php -b php-sdk-release

      - name: Push PHP SDK main
        run: |
          git push git@github.com:bublehq/php-sdk.git php-sdk-release:main --force-with-lease

      - name: Push PHP SDK version tag
        run: |
          git tag -f "${{ steps.version.outputs.tag }}" php-sdk-release
          git push git@github.com:bublehq/php-sdk.git "${{ steps.version.outputs.tag }}" --force
